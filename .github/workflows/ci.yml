name: ChainOps Agent CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint with ruff
        working-directory: backend
        run: ruff check main.py scanner.py

      - name: Install exporter deps
        working-directory: exporters
        run: pip install -r requirements.txt

      - name: Lint exporter
        working-directory: exporters
        run: ruff check exporter.py || true

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t chainops-backend:ci

      - name: Build exporter image
        run: docker build ./exporters -t chainops-exporter:ci

      - name: Verify images built
        run: |
          docker image inspect chainops-backend:ci --format '{{.Id}}'
          docker image inspect chainops-exporter:ci --format '{{.Id}}'
