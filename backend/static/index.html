<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChainOps Agent</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --bg2: #0f1217;
    --bg3: #161b23;
    --border: #1e2530;
    --border2: #2a3442;
    --green: #00ff88;
    --green-dim: #00cc6a;
    --green-dark: rgba(0,255,136,0.08);
    --yellow: #ffcc00;
    --red: #ff4466;
    --red-dark: rgba(255,68,102,0.1);
    --blue: #4499ff;
    --text: #c8d8e8;
    --text-dim: #5a7080;
    --text-bright: #e8f4ff;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* scan lines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ─── Layout ─────────────────────────────────────────── */
  .app { display: flex; flex-direction: column; height: 100vh; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 28px; height: 28px;
    border: 1.5px solid var(--green);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    color: var(--green);
    font-size: 14px;
    animation: pulse-border 3s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0); }
    50% { box-shadow: 0 0 0 4px rgba(0,255,136,0.12); }
  }

  .logo-text {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-bright);
  }

  .logo-text span { color: var(--green); }

  .header-status {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: blink 2s ease-in-out infinite;
    display: inline-block;
    margin-right: 5px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* ─── Left Panel ─────────────────────────────────────── */
  .left-panel {
    width: 320px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
    background: var(--bg2);
  }

  .panel-section {
    border-bottom: 1px solid var(--border);
    padding: 16px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* ─── Metric Cards ───────────────────────────────────── */
  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .metric-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }

  .metric-card:hover { border-color: var(--border2); }
  .metric-card.anomaly { border-color: var(--red); background: var(--red-dark); }
  .metric-card.healthy { border-color: rgba(0,255,136,0.2); }

  .metric-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .metric-value {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-bright);
  }

  .metric-value.green { color: var(--green); }
  .metric-value.red { color: var(--red); }
  .metric-value.yellow { color: var(--yellow); }

  .metric-unit { font-size: 10px; color: var(--text-dim); font-weight: 400; }

  /* ─── Incidents ──────────────────────────────────────── */
  .incident-list { display: flex; flex-direction: column; gap: 8px; }

  .incident-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .incident-item:hover { border-color: var(--border2); border-left-color: var(--blue); }
  .incident-item.critical { border-left-color: var(--red); }
  .incident-item.warning { border-left-color: var(--yellow); }
  .incident-item.resolved { opacity: 0.5; }

  .incident-title {
    font-size: 12px;
    color: var(--text-bright);
    margin-bottom: 4px;
    font-weight: 500;
  }

  .incident-meta {
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
  }

  .badge {
    font-size: 9px;
    letter-spacing: 0.08em;
    padding: 1px 6px;
    border-radius: 2px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .badge.critical { background: rgba(255,68,102,0.2); color: var(--red); }
  .badge.warning { background: rgba(255,204,0,0.2); color: var(--yellow); }
  .badge.resolved { background: rgba(0,255,136,0.1); color: var(--green); }

  .detect-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 8px;
    cursor: pointer;
    border-radius: 3px;
    text-transform: uppercase;
    transition: all 0.15s;
    margin-top: 10px;
  }

  .detect-btn:hover {
    background: var(--green-dark);
    border-color: var(--green);
    color: var(--green);
  }

  /* ─── Right Panel: Chat ──────────────────────────────── */
  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .message {
    display: flex;
    gap: 12px;
    max-width: 820px;
    animation: msg-in 0.2s ease;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-avatar.agent {
    background: var(--green-dark);
    border: 1px solid rgba(0,255,136,0.3);
    color: var(--green);
  }

  .msg-avatar.user {
    background: rgba(68,153,255,0.1);
    border: 1px solid rgba(68,153,255,0.3);
    color: var(--blue);
  }

  .msg-body { flex: 1; }

  .msg-header {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .msg-content {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    color: var(--text);
    line-height: 1.7;
    font-size: 13px;
  }

  .message.user .msg-content {
    background: rgba(68,153,255,0.07);
    border-color: rgba(68,153,255,0.2);
    color: var(--text-bright);
  }

  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 4px 0;
  }

  .typing-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
    animation: typing 1.2s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ─── Chat Input ─────────────────────────────────────── */
  .chat-input-area {
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    background: var(--bg2);
    flex-shrink: 0;
  }

  .quick-questions {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .quick-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .quick-btn:hover {
    color: var(--green);
    border-color: rgba(0,255,136,0.4);
    background: var(--green-dark);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .prompt-symbol {
    color: var(--green);
    font-size: 14px;
    flex-shrink: 0;
  }

  #chat-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  #chat-input:focus { border-color: rgba(0,255,136,0.5); }
  #chat-input::placeholder { color: var(--text-dim); }

  .send-btn {
    background: var(--green-dark);
    border: 1px solid rgba(0,255,136,0.4);
    color: var(--green);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover {
    background: rgba(0,255,136,0.15);
    box-shadow: 0 0 12px rgba(0,255,136,0.2);
  }

  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ─── Empty state ────────────────────────────────────── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    gap: 12px;
    padding: 40px;
    text-align: center;
  }

  .empty-icon {
    font-size: 32px;
    opacity: 0.4;
  }

  .empty-title {
    font-size: 14px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  .empty-sub {
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.6;
  }

  /* ─── Loading overlay ────────────────────────────────── */
  .spinner {
    width: 12px; height: 12px;
    border: 2px solid rgba(0,255,136,0.2);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .no-incidents {
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    padding: 12px 0;
  }

  /* ─── Incident Detail Modal ──────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fade-in 0.15s ease;
  }

  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    width: 560px;
    max-width: 94vw;
    max-height: 80vh;
    overflow-y: auto;
    animation: modal-in 0.2s ease;
  }

  @keyframes modal-in {
    from { transform: translateY(12px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
  }

  .modal-title { font-size: 14px; font-weight: 600; color: var(--text-bright); line-height: 1.4; }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    flex-shrink: 0;
    margin-left: 12px;
  }

  .modal-close:hover { color: var(--text-bright); }

  .modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 16px; }

  .modal-field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .modal-field p {
    font-size: 13px;
    color: var(--text);
    line-height: 1.7;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
  }

  .modal-field p.action {
    border-left: 3px solid var(--green);
    color: var(--text-bright);
  }

  .modal-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .modal-metric-chip {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 6px 10px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .modal-metric-chip span { color: var(--text-bright); font-weight: 500; }

  .modal-footer {
    padding: 12px 20px 18px;
    display: flex;
    gap: 10px;
  }

  .resolve-btn {
    background: var(--green-dark);
    border: 1px solid rgba(0,255,136,0.4);
    color: var(--green);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 8px 16px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .resolve-btn:hover { background: rgba(0,255,136,0.15); }

  .ask-about-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 8px 16px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .ask-about-btn:hover { border-color: var(--blue); color: var(--blue); }
</style>
</head>
<body>
<!-- Incident Detail Modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title">—</div>
        <div style="margin-top:6px"><span class="badge" id="modal-badge">—</span></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label>Summary</label>
        <p id="modal-summary">—</p>
      </div>
      <div class="modal-field">
        <label>Recommended Action</label>
        <p class="action" id="modal-action">—</p>
      </div>
      <div class="modal-field" id="modal-metrics-section">
        <label>Metrics at Detection</label>
        <div class="modal-metrics" id="modal-metrics"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="resolve-btn" id="modal-resolve-btn" onclick="resolveFromModal()">Mark Resolved</button>
      <button class="ask-about-btn" onclick="askAboutIncident()">Ask Agent About This</button>
    </div>
  </div>
</div>

<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">⬡</div>
      <div class="logo-text">CHAIN<span>OPS</span> AGENT</div>
    </div>
    <div class="header-status">
      <span id="rpc-status"><span class="status-dot"></span>CONNECTING...</span>
      <span id="last-update">—</span>
    </div>
  </header>

  <div class="main">

    <!-- Left Panel -->
    <div class="left-panel">

      <!-- Metrics -->
      <div class="panel-section">
        <div class="section-label">Live Metrics</div>
        <div class="metric-grid" id="metrics-grid">
          <div class="metric-card"><div class="metric-label">Block</div><div class="metric-value" id="m-block">—</div></div>
          <div class="metric-card"><div class="metric-label">Block Time</div><div class="metric-value" id="m-blocktime">—<span class="metric-unit">s</span></div></div>
          <div class="metric-card"><div class="metric-label">Gas Price</div><div class="metric-value" id="m-gas">—<span class="metric-unit"> gwei</span></div></div>
          <div class="metric-card"><div class="metric-label">RPC Latency p99</div><div class="metric-value" id="m-latency">—<span class="metric-unit">s</span></div></div>
          <div class="metric-card"><div class="metric-label">Pending Txs</div><div class="metric-value" id="m-pending">—</div></div>
          <div class="metric-card"><div class="metric-label">Block Txs</div><div class="metric-value" id="m-blocktx">—</div></div>
        </div>
      </div>

      <!-- Anomaly Detection -->
      <div class="panel-section">
        <div class="section-label">Incidents</div>
        <div class="incident-list" id="incident-list">
          <div class="no-incidents">No incidents detected</div>
        </div>
        <button class="detect-btn" id="detect-btn" onclick="runDetection()">
          ▶ Run Anomaly Detection
        </button>
      </div>

    </div>

    <!-- Chat Panel -->
    <div class="chat-panel">
      <div class="chat-messages" id="chat-messages">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">◈</div>
          <div class="empty-title">CHAINOPS AGENT READY</div>
          <div class="empty-sub">Ask anything about your Web3 infrastructure</div>
        </div>
      </div>

      <div class="chat-input-area">
        <div class="quick-questions">
          <button class="quick-btn" onclick="sendQuick('What is the current network health?')">Network health?</button>
          <button class="quick-btn" onclick="sendQuick('Is gas price unusually high right now?')">Gas anomaly?</button>
          <button class="quick-btn" onclick="sendQuick('Is the RPC endpoint performing well?')">RPC performance?</button>
          <button class="quick-btn" onclick="sendQuick('What is causing slow block times?')">Block times?</button>
          <button class="quick-btn" onclick="sendQuick('Give me an infrastructure status summary.')">Status summary</button>
        </div>
        <div class="input-row">
          <span class="prompt-symbol">›</span>
          <input id="chat-input" type="text" placeholder="Ask the agent..." autocomplete="off" />
          <button class="send-btn" id="send-btn" onclick="sendMessage()">SEND</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const API = '';
let isTyping = false;

// ─── Conversation History (for agent memory) ────────────────────────────────
let conversationHistory = [];

// ─── Active incident for modal ──────────────────────────────────────────────
let activeIncident = null;

// ─── Metrics Polling ────────────────────────────────────────────────────────
async function fetchMetrics() {
  try {
    const res = await fetch(`${API}/metrics/snapshot`);
    const data = await res.json();
    updateMetricsUI(data.snapshot, data.anomalies);
  } catch (e) {
    document.getElementById('rpc-status').innerHTML =
      '<span class="status-dot" style="background:var(--red);box-shadow:0 0 6px var(--red)"></span>OFFLINE';
  }
}

function updateMetricsUI(s, anomalies) {
  const set = (id, val, unit = '', colorFn = null) => {
    const el = document.getElementById(id);
    if (!el) return;
    const display = (val !== null && val !== undefined) ? val : '—';
    el.innerHTML = display !== '—'
      ? `${display}<span class="metric-unit">${unit}</span>`
      : '—';
    if (colorFn && display !== '—') el.className = `metric-value ${colorFn(val)}`;
  };

  set('m-block', s.block_number ? s.block_number.toLocaleString() : null, '');
  set('m-blocktime', s.block_time_seconds ? s.block_time_seconds.toFixed(1) : null, 's',
    v => v > 20 ? 'red' : v > 14 ? 'yellow' : 'green');
  set('m-gas', s.gas_price_gwei ? s.gas_price_gwei.toFixed(1) : null, ' gwei',
    v => v > 200 ? 'red' : v > 80 ? 'yellow' : 'green');
  set('m-latency', s.rpc_latency_p99 !== null ? s.rpc_latency_p99 : null, 's',
    v => v > 3 ? 'red' : v > 1 ? 'yellow' : 'green');
  set('m-pending', s.pending_tx_count ? s.pending_tx_count.toLocaleString() : null, '');
  set('m-blocktx', s.block_tx_count !== null ? s.block_tx_count : null, '');

  const isUp = s.rpc_up === 1;
  const dotColor = isUp ? 'var(--green)' : 'var(--red)';
  document.getElementById('rpc-status').innerHTML =
    `<span class="status-dot" style="background:${dotColor};box-shadow:0 0 6px ${dotColor}"></span>${isUp ? 'ETHEREUM MAINNET' : 'RPC DOWN'}`;

  document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
}

// ─── Incidents ───────────────────────────────────────────────────────────────
async function fetchIncidents() {
  try {
    const res = await fetch(`${API}/incidents`);
    const data = await res.json();
    renderIncidents(data.incidents);
  } catch (e) {}
}

function renderIncidents(incidents) {
  const el = document.getElementById('incident-list');
  if (!incidents.length) {
    el.innerHTML = '<div class="no-incidents">No incidents detected</div>';
    return;
  }
  el.innerHTML = incidents.slice(0, 8).map(inc => `
    <div class="incident-item ${inc.resolved ? 'resolved' : inc.severity}"
         onclick="openModal(${inc.id})"
         title="Click for details">
      <div class="incident-title">${inc.title}</div>
      <div class="incident-meta">
        <span class="badge ${inc.resolved ? 'resolved' : inc.severity}">
          ${inc.resolved ? 'RESOLVED' : inc.severity.toUpperCase()}
        </span>
        <span>${new Date(inc.timestamp).toLocaleTimeString()}</span>
      </div>
    </div>
  `).join('');
}

// ─── Incident Modal ──────────────────────────────────────────────────────────
async function openModal(incidentId) {
  try {
    const res = await fetch(`${API}/incidents/${incidentId}`);
    const inc = await res.json();
    activeIncident = inc;

    document.getElementById('modal-title').textContent = inc.title;

    const badge = document.getElementById('modal-badge');
    badge.textContent = inc.resolved ? 'RESOLVED' : inc.severity.toUpperCase();
    badge.className = `badge ${inc.resolved ? 'resolved' : inc.severity}`;

    document.getElementById('modal-summary').textContent = inc.summary;
    document.getElementById('modal-action').textContent = inc.recommended_action;

    // Metrics chips
    const metricsEl = document.getElementById('modal-metrics');
    const m = inc.metrics_at_detection || {};
    const chips = Object.entries(m)
      .filter(([, v]) => v !== null)
      .map(([k, v]) => {
        const label = k.replace(/_/g, ' ');
        const display = typeof v === 'number' ? (v > 1000 ? v.toLocaleString() : v.toFixed(2)) : v;
        return `<div class="modal-metric-chip">${label}: <span>${display}</span></div>`;
      }).join('');
    metricsEl.innerHTML = chips || '<div class="modal-metric-chip">No metrics recorded</div>';

    const resolveBtn = document.getElementById('modal-resolve-btn');
    resolveBtn.style.display = inc.resolved ? 'none' : 'block';

    document.getElementById('modal-overlay').style.display = 'flex';
  } catch (e) {
    console.error('Failed to load incident:', e);
  }
}

function closeModal(event) {
  if (event && event.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').style.display = 'none';
  activeIncident = null;
}

async function resolveFromModal() {
  if (!activeIncident) return;
  try {
    await fetch(`${API}/incidents/${activeIncident.id}/resolve`, { method: 'POST' });
    document.getElementById('modal-overlay').style.display = 'none';
    activeIncident = null;
    await fetchIncidents();
  } catch (e) {}
}

function askAboutIncident() {
  if (!activeIncident) return;
  document.getElementById('modal-overlay').style.display = 'none';
  const q = `Tell me more about this incident: "${activeIncident.title}". ${activeIncident.summary}`;
  document.getElementById('chat-input').value = q;
  document.getElementById('chat-input').focus();
}

// ESC key closes modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('modal-overlay').style.display = 'none';
    activeIncident = null;
  }
});

// ─── Anomaly Detection ────────────────────────────────────────────────────────
async function runDetection() {
  const btn = document.getElementById('detect-btn');
  btn.innerHTML = '<span class="spinner"></span>SCANNING...';
  btn.disabled = true;
  try {
    const res = await fetch(`${API}/detect`, { method: 'POST' });
    const data = await res.json();
    await fetchIncidents();
    if (data.detected > 0) {
      appendMessage('agent',
        `🔴 Detected ${data.detected} anomal${data.detected === 1 ? 'y' : 'ies'}. ` +
        `Click any incident in the panel for details and recommended actions.`);
    } else {
      appendMessage('agent', '✅ No anomalies detected. All metrics are within normal thresholds.');
    }
  } catch (e) {
    appendMessage('agent', 'Failed to run detection — is the backend reachable?');
  } finally {
    btn.innerHTML = '▶ Run Anomaly Detection';
    btn.disabled = false;
  }
}

// ─── Chat ─────────────────────────────────────────────────────────────────────
function appendMessage(role, text) {
  const container = document.getElementById('chat-messages');
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  const msg = document.createElement('div');
  msg.className = `message ${role}`;
  const avatarChar = role === 'agent' ? '⬡' : '↑';
  const label = role === 'agent' ? 'CHAINOPS AGENT' : 'YOU';

  msg.innerHTML = `
    <div class="msg-avatar ${role}">${avatarChar}</div>
    <div class="msg-body">
      <div class="msg-header">${label}</div>
      <div class="msg-content">${text.replace(/\n/g, '<br>')}</div>
    </div>
  `;

  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
  return msg;
}

function showTyping() {
  const container = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = 'message agent';
  el.id = 'typing-indicator';
  el.innerHTML = `
    <div class="msg-avatar agent">⬡</div>
    <div class="msg-body">
      <div class="msg-header">CHAINOPS AGENT</div>
      <div class="msg-content">
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    </div>
  `;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const question = input.value.trim();
  if (!question || isTyping) return;
  input.value = '';
  appendMessage('user', question);
  await ask(question);
}

async function sendQuick(q) {
  if (isTyping) return;
  appendMessage('user', q);
  await ask(q);
}

async function ask(question) {
  isTyping = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();

  try {
    const res = await fetch(`${API}/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question,
        history: conversationHistory,  // send full history for memory
      }),
    });
    const data = await res.json();
    hideTyping();

    const answer = data.answer || 'No response received.';
    appendMessage('agent', answer);

    // Update conversation history (keep last 20 turns to avoid token bloat)
    conversationHistory.push({ role: 'user', content: question });
    conversationHistory.push({ role: 'assistant', content: answer });
    if (conversationHistory.length > 40) {
      conversationHistory = conversationHistory.slice(-40);
    }

  } catch (e) {
    hideTyping();
    appendMessage('agent', '⚠ Failed to reach the agent backend. Make sure the API server is running.');
  } finally {
    isTyping = false;
    document.getElementById('send-btn').disabled = false;
  }
}

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

// ─── Init ─────────────────────────────────────────────────────────────────────
fetchMetrics();
fetchIncidents();
setInterval(fetchMetrics, 15000);
setInterval(fetchIncidents, 30000);
</script>
