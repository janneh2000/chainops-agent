global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  receiver: "null"
  routes:
    - match:
        severity: critical
      receiver: "slack-critical"
    - match:
        severity: warning
      receiver: "slack-default"

receivers:
  - name: "null"

  - name: "slack-default"
    slack_configs:
      - api_url: "https://hooks.slack.com/services/REPLACE_WITH_YOUR_WEBHOOK"
        channel: "#chainops-alerts"
        send_resolved: true
        title: '⚠ ChainOps: {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Severity:* {{ .Labels.severity | toUpper }}
          *Summary:* {{ .Annotations.summary }}
          {{ end }}

  - name: "slack-critical"
    slack_configs:
      - api_url: "https://hooks.slack.com/services/REPLACE_WITH_YOUR_WEBHOOK"
        channel: "#chainops-critical"
        send_resolved: true
        title: '🔴 CRITICAL: {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
